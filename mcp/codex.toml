# Фрагмент для ~/.codex/config.toml (OpenAI Codex CLI).
# Плейсхолдеры <...> замени на свои значения — см. mcp/README.md.

[mcp_servers.codegraph]
command = "codegraph"
args = ["serve", "--mcp"]

[mcp_servers.context7]
command = "npx"
args = ["-y", "@upstash/context7-mcp"]

[mcp_servers.playwright]
command = "npx"
args = ["-y", "@playwright/mcp-server"]

[mcp_servers.huly]
command = "node"
args = ["<ABS_PATH_TO>/huly-mcp/dist/index.cjs"]
env = { HULY_URL = "<HULY_HOST_URL>", HULY_TOKEN = "<PERSONAL_HULY_TOKEN>", HULY_WORKSPACE = "<WORKSPACE_UUID>" }

# learn-go-with-tests (HTTP):
[mcp_servers.learn-go-with-tests]
url = "https://quii.gitbook.io/learn-go-with-tests/~gitbook/mcp"
